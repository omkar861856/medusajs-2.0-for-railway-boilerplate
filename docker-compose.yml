version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: medusa-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-medusa}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: medusa-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medusa-backend
    restart: always
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-medusa}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-supersecret}
      - COOKIE_SECRET=${COOKIE_SECRET:-supersecret}
      - ADMIN_CORS=${ADMIN_CORS:-http://localhost:7000,http://localhost:9000,http://localhost:8000}
      - STORE_CORS=${STORE_CORS:-http://localhost:8000}
      - AUTH_CORS=${AUTH_CORS:-http://localhost:7000,http://localhost:9000,http://localhost:8000}
      - MEDUSA_ADMIN_EMAIL=${MEDUSA_ADMIN_EMAIL:-admin@medusa-test.com}
      - MEDUSA_ADMIN_PASSWORD=${MEDUSA_ADMIN_PASSWORD:-supersecret}
      - NODE_ENV=development
    ports:
      - "9000:9000"
    depends_on:
      - postgres
      - redis

  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_MEDUSA_BACKEND_URL=${NEXT_PUBLIC_MEDUSA_BACKEND_URL:-http://localhost:9000}
    container_name: medusa-storefront
    restart: always
    environment:
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=${NEXT_PUBLIC_MEDUSA_BACKEND_URL:-http://localhost:9000}
      - PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
